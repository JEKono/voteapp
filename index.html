<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プレゼン投票</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Barlow+Condensed:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;
  --border:rgba(255,255,255,0.1);--accent:#f0c040;--accent2:#e05a5a;
  --text:#f0eee8;--muted:#aaa;
  --c1:#7c6af7;--c2:#4fa8e0;--c3:#4ec97a;--c4:#f07060;
  --s1:#e05a5a;--s2:#e07a30;--s3:#e0c030;--s4:#80c040;--s5:#40c890;
  --wide:'Barlow Condensed',sans-serif;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.page{display:none;min-height:100vh;flex-direction:column;}
.page.active{display:flex;}

/* LOADING */
#loadingPage{justify-content:center;align-items:center;}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SETUP — 4列横並び */
#setupPage{padding:24px;gap:14px;align-items:stretch;}
#setupPage h1{font-family:var(--wide);font-weight:900;font-size:40px;letter-spacing:4px;color:var(--accent);text-align:center;}
.sub{font-size:15px;color:var(--muted);text-align:center;}
.setup-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.setup-team{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden;}
.setup-team::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.s0::before{background:var(--c1);}.s1::before{background:var(--c2);}.s2::before{background:var(--c3);}.s3::before{background:var(--c4);}
.setup-num{font-family:var(--wide);font-weight:900;font-size:18px;letter-spacing:1px;}
.s0 .setup-num{color:var(--c1);}.s1 .setup-num{color:var(--c2);}.s2 .setup-num{color:var(--c3);}.s3 .setup-num{color:var(--c4);}
.setup-label{font-size:12px;color:var(--muted);margin-top:2px;}
.setup-input{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;}
.setup-input:focus{outline:none;border-color:var(--accent);}

/* ボタン共通 — カプセル型・適度な幅 */
.btn-wrap{display:flex;justify-content:center;margin-top:4px;}
.btn{padding:14px 40px;border-radius:50px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;cursor:pointer;transition:all .2s;min-width:200px;text-align:center;}
.btn:hover{background:rgba(255,255,255,0.08);}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;font-size:17px;padding:16px 56px;}
.btn.primary:hover{background:#ffd060;}
.btn.danger{border-color:rgba(224,90,90,0.4);color:var(--accent2);}
.btn.end-vote{background:rgba(224,90,90,0.15);border-color:rgba(224,90,90,0.5);color:#ff8080;font-weight:700;}
.btn.end-vote:hover{background:rgba(224,90,90,0.25);}
.btn.qr-btn{background:rgba(78,201,122,0.12);border-color:rgba(78,201,122,0.4);color:#4ec97a;font-weight:700;}
.btn.qr-btn:hover{background:rgba(78,201,122,0.2);}

/* ADMIN */
#adminPage{background:var(--bg);}
.admin-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.admin-header h1{font-family:var(--wide);font-weight:900;font-size:32px;letter-spacing:4px;color:var(--accent);}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:15px;color:var(--muted);}
.badge.open{color:#4ec97a;border-color:rgba(78,201,122,0.3);}
.admin-body{padding:16px;display:flex;flex-direction:column;gap:14px;flex:1;}
.section-title{font-family:var(--wide);font-size:15px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}

/* 投票数大表示 */
.vote-count-display{text-align:center;padding:8px 0 4px;}
.vcd-num{font-family:var(--wide);font-weight:900;font-size:64px;color:var(--accent);line-height:1;}
.vcd-label{font-size:15px;color:var(--muted);margin-top:2px;}

/* 積み上げ棒グラフ — 幅50%中央寄せ */
.bar-chart{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 12px 14px;width:50%;margin:0 auto;}
.chart-area{display:flex;align-items:flex-end;gap:8px;height:220px;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-outer{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;}
.bar-track{width:70%;display:flex;flex-direction:column;justify-content:flex-end;border-radius:4px 4px 0 0;overflow:hidden;transition:all .3s;}
.stack-seg{width:100%;display:flex;align-items:center;justify-content:center;transition:height .5s cubic-bezier(.4,0,.2,1);overflow:hidden;position:relative;}
.seg-label{font-family:var(--wide);font-weight:700;font-size:11px;color:rgba(0,0,0,0.7);line-height:1;pointer-events:none;white-space:nowrap;}
.sc1{background:var(--s1);}.sc2{background:var(--s2);}.sc3{background:var(--s3);}.sc4{background:var(--s4);}.sc5{background:var(--s5);}
.chart-score-num{font-family:var(--wide);font-weight:900;font-size:26px;color:var(--text);line-height:1;}
.chart-baseline{height:1px;background:var(--border);margin:5px 0 8px;}
.chart-entry{font-family:var(--wide);font-weight:700;font-size:13px;color:var(--muted);letter-spacing:1px;}
.chart-name{font-size:10px;color:var(--muted);text-align:center;line-height:1.4;word-break:break-all;}
.chart-votes{font-size:10px;color:var(--muted);}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);}
.legend-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0;}

/* QRコード — 白背景でインライン表示 */
.qr-inline{background:#ffffff;border-radius:12px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px;width:50%;margin:0 auto;}
.qr-inline-label{font-family:var(--wide);font-weight:900;font-size:22px;letter-spacing:3px;color:#111;text-align:center;}
.qr-inline-url{font-size:12px;color:#555;word-break:break-all;text-align:center;max-width:280px;line-height:1.7;}

/* VOTE */
#votePage{background:var(--bg);}
.vote-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;text-align:center;}
.vote-header h1{font-family:var(--wide);font-weight:900;font-size:34px;letter-spacing:4px;color:var(--accent);}
.vote-header p{font-size:15px;color:var(--muted);margin-top:4px;}
.vote-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:12px;}
.vote-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.vote-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;}
.vc0::before{background:var(--c1);}.vc1::before{background:var(--c2);}.vc2::before{background:var(--c3);}.vc3::before{background:var(--c4);}
.vc-entry{font-family:var(--wide);font-weight:700;font-size:15px;color:var(--muted);margin-bottom:3px;letter-spacing:1px;}
.vc-title{font-size:17px;font-weight:700;margin-bottom:2px;}
.vc-pres{font-size:13px;color:var(--muted);margin-bottom:10px;}
.rating-row{display:flex;gap:6px;}
.star-btn{flex:1;padding:11px 2px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.star-num{font-family:var(--wide);font-weight:900;font-size:22px;color:var(--text);line-height:1;}
.star-lbl{font-size:9px;text-align:center;line-height:1.3;color:var(--muted);}
.star-btn.sel,.star-btn:hover{border-color:var(--accent);background:rgba(240,192,64,0.12);}
.star-btn.sel .star-num,.star-btn:hover .star-num,.star-btn.sel .star-lbl,.star-btn:hover .star-lbl{color:var(--accent);}
.vote-footer{padding:12px 14px 32px;display:flex;justify-content:center;}
#submitBtn{padding:16px 48px;border-radius:50px;border:none;background:var(--accent);color:#000;font-family:'Noto Sans JP',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s;min-width:240px;}
#submitBtn:hover{background:#ffd060;}
#submitBtn:active{transform:scale(.98);}
#submitBtn:disabled{background:var(--muted);cursor:not-allowed;}

/* 締切・Thanks */
#closedPage,#thanksPage{justify-content:center;align-items:center;}
.center-wrap{text-align:center;padding:40px 32px;}
.center-wrap .icon{font-size:80px;margin-bottom:20px;}
.center-wrap h2{font-family:var(--wide);font-weight:900;font-size:48px;letter-spacing:3px;margin-bottom:12px;}
.center-wrap p{font-size:18px;color:var(--muted);line-height:2;}

/* RESULT OVERLAY */
#resultOverlay{display:none;position:fixed;inset:0;background:#000;z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#resultOverlay.active{display:flex;}
.drumroll-wrap{text-align:center;}
.drumroll-wrap h2{font-family:var(--wide);font-weight:900;font-size:clamp(50px,11vw,100px);letter-spacing:6px;color:var(--accent);animation:pulse .25s infinite alternate;}
.drumroll-wrap p{font-size:clamp(16px,2.5vw,24px);color:var(--muted);margin-top:16px;}
@keyframes pulse{from{opacity:.55;transform:scale(.95);}to{opacity:1;transform:scale(1.04);}}
#resultWrap{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;max-height:100vh;}
.result-title{font-family:var(--wide);font-weight:900;font-size:clamp(38px,8vw,80px);letter-spacing:5px;color:var(--accent);margin-bottom:clamp(12px,2.5vh,28px);text-align:center;}
.result-list{display:flex;flex-direction:column;gap:clamp(8px,1.4vh,16px);width:100%;max-width:820px;}
.result-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:clamp(12px,2vh,22px) clamp(16px,3vw,28px);display:flex;align-items:center;gap:clamp(12px,2vw,24px);opacity:0;transform:translateX(-60px);transition:all .65s cubic-bezier(.4,0,.2,1);}
.result-item.show{opacity:1;transform:none;}
.result-item.gold{border:2px solid var(--accent);background:rgba(240,192,64,0.07);}
.result-item.silver{border-color:rgba(192,192,210,0.5);}
.result-item.bronze{border-color:rgba(200,130,60,0.5);}
.r-rank{font-family:var(--wide);font-weight:900;font-size:clamp(42px,6.5vw,72px);min-width:clamp(48px,6vw,76px);text-align:center;line-height:1;}
.r-entry{font-family:var(--wide);font-weight:700;font-size:clamp(14px,1.8vw,20px);color:var(--muted);display:block;letter-spacing:1px;}
.r-name{font-size:clamp(18px,3.2vw,32px);font-weight:700;line-height:1.3;}
.r-pres{font-size:clamp(13px,1.6vw,17px);color:var(--muted);margin-top:3px;}
.r-info{flex:1;}
.r-score{font-family:var(--wide);font-weight:900;font-size:clamp(48px,8vw,84px);color:var(--accent);line-height:1;}
.r-score-label{font-size:clamp(11px,1.2vw,14px);color:var(--muted);text-align:right;}
.r-score-wrap{text-align:right;}
.close-btn{margin-top:clamp(12px,2vh,22px);padding:12px 40px;border-radius:50px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:16px;cursor:pointer;}

/* confetti */
.cp{position:fixed;top:-20px;animation:fall linear forwards;z-index:200;border-radius:2px;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="page active" id="loadingPage">
  <div style="text-align:center;">
    <div class="spinner"></div>
    <p style="font-size:18px;color:var(--muted);">接続中...</p>
  </div>
</div>

<!-- SETUP -->
<div class="page" id="setupPage">
  <div style="padding:24px;display:flex;flex-direction:column;gap:14px;">
    <h1 style="font-family:var(--wide);font-weight:900;font-size:40px;letter-spacing:4px;color:var(--accent);text-align:center;">🗳 VOTE SETUP</h1>
    <p class="sub">4チームの企画名とプレゼンター名を入力してください</p>
    <div class="setup-grid" id="setupTeams"></div>
    <div class="btn-wrap">
      <button class="btn primary" onclick="startSession()">投票セッションを開始 →</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="page" id="adminPage">
  <div class="admin-header">
    <h1>🗳 LIVE VOTING</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <div class="badge open" id="statusBadge">受付中</div>
      <div class="badge" id="progressBadge">0 票</div>
    </div>
  </div>
  <div class="admin-body">
    <div class="section-title">リアルタイムスコア（積み上げ合計点）</div>

    <!-- 現在の投票数 大表示 -->
    <div class="vote-count-display">
      <div class="vcd-num" id="vcdNum">0</div>
      <div class="vcd-label">票 投票済み</div>
    </div>

    <!-- 棒グラフ（幅50%） -->
    <div class="bar-chart">
      <div class="chart-area" id="chartArea"></div>
      <div class="chart-baseline"></div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--s1)"></div>1点</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s2)"></div>2点</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s3)"></div>3点</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s4)"></div>4点</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s5)"></div>5点</div>
      </div>
    </div>

    <!-- QRコード（白背景・インライン） -->
    <div class="section-title" style="margin-top:4px;">投票用QRコード</div>
    <div class="qr-inline">
      <div class="qr-inline-label">投票用URL</div>
      <div id="qrInlineCode"></div>
      <div class="qr-inline-url" id="qrInlineUrl"></div>
    </div>

    <!-- ボタン群 -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:8px;">
      <button class="btn end-vote" onclick="endVoting()">🛑 投票を締め切る</button>
      <button class="btn primary" onclick="revealResults()">🎉 結果発表！</button>
      <button class="btn danger" onclick="resetAll()">リセット</button>
    </div>
  </div>
</div>

<!-- VOTE -->
<div class="page" id="votePage">
  <div class="vote-header">
    <h1>📊 VOTE</h1>
    <p>各企画を1〜5点で採点してください</p>
  </div>
  <div class="vote-body" id="voteCards"></div>
  <div class="vote-footer">
    <button id="submitBtn" onclick="submitVote()" disabled>全チームの採点が必要です</button>
  </div>
</div>

<!-- 締切 -->
<div class="page" id="closedPage">
  <div class="center-wrap">
    <div class="icon">🔒</div>
    <h2 style="color:var(--accent2);">投票は締め切られました</h2>
    <p>ご参加ありがとうございました。<br>結果発表をお楽しみに。</p>
  </div>
</div>

<!-- THANKS -->
<div class="page" id="thanksPage">
  <div class="center-wrap">
    <div class="icon">🙏</div>
    <h2 style="color:var(--accent);">VOTED!</h2>
    <p>投票ありがとうございました！<br>結果発表をお楽しみに。</p>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div id="resultOverlay">
  <div class="drumroll-wrap" id="drumrollWrap">
    <h2>🥁 ドラムロール 🥁</h2>
    <p>集計中...</p>
  </div>
  <div id="resultWrap">
    <div class="result-title">🏆 結果発表 🏆</div>
    <div class="result-list" id="resultList"></div>
    <button class="close-btn" onclick="closeResult()">閉じる</button>
  </div>
</div>

const AUDIO_SRC='data:audio/mp3;base64,'+AUDIO_B64;

let teams=[],selScores=[0,0,0,0],voteUrl='',qrGenerated=false;

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===================== SETUP =====================
function buildSetup(){
  const defs=[
    {name:'AIスマートオフィス',presenter:'田中 / 佐藤'},
    {name:'グリーンデリバリー', presenter:'山田 / 鈴木'},
    {name:'ヘルスケアAI',      presenter:'伊藤 / 渡辺'},
    {name:'SNSコマース',       presenter:'中村 / 小林'},
  ];
  document.getElementById('setupTeams').innerHTML=defs.map((d,i)=>`
    <div class="setup-team s${i}">
      <div class="setup-num">ENTRY #${i+1}</div>
      <span class="setup-label">企画名</span>
      <input class="setup-input" id="tn${i}" value="${d.name}">
      <span class="setup-label">プレゼンター</span>
      <input class="setup-input" id="tp${i}" value="${d.presenter}">
    </div>
  `).join('');
}

async function startSession(){
  teams=[];
  for(let i=0;i<4;i++) teams.push({
    name:document.getElementById('tn'+i).value||`企画${i+1}`,
    presenter:document.getElementById('tp'+i).value||`発表者${i+1}`
  });
  await db.ref('session').set({teams,active:true,closed:false,createdAt:Date.now()});
  await db.ref('votes').remove();
  goAdmin();
}

// ===================== ADMIN =====================
function goAdmin(){
  show('adminPage');
  buildChart();
  voteUrl=location.origin+location.pathname+'?vote=1';
  genQRInline();
  listenVotes();
}

function buildChart(){
  document.getElementById('chartArea').innerHTML=teams.map((t,i)=>`
    <div class="chart-col">
      <div class="chart-score-num" id="cscore${i}">0</div>
      <div class="bar-outer">
        <div class="bar-track" id="btrack${i}"></div>
      </div>
      <div class="chart-entry">NO.${i+1}</div>
      <div class="chart-name">${t.name}</div>
      <div class="chart-votes" id="cvotes${i}">0票</div>
    </div>
  `).join('');
}

function genQRInline(){
  document.getElementById('qrInlineUrl').textContent=voteUrl;
  if(!qrGenerated){
    new QRCode(document.getElementById('qrInlineCode'),{
      text:voteUrl,width:200,height:200,
      colorDark:'#000000',colorLight:'#ffffff',
      correctLevel:QRCode.CorrectLevel.M
    });
    qrGenerated=true;
  }
}

function listenVotes(){
  db.ref('votes').on('value',snap=>updateChart(snap.val()||{}));
}

function updateChart(data){
  const all=Object.values(data);
  const voteCount=all.length;
  document.getElementById('progressBadge').textContent=`${voteCount} 票`;
  document.getElementById('vcdNum').textContent=voteCount;

  const stats=teams.map((_,i)=>{
    const counts=[0,0,0,0,0];
    let total=0,count=0;
    all.forEach(v=>{const s=v.scores[i];if(s>=1&&s<=5){counts[s-1]++;total+=s;count++;}});
    return{counts,total,count};
  });

  const maxTotal=Math.max(...stats.map(s=>s.total),1);

  stats.forEach((st,i)=>{
    document.getElementById('cscore'+i).textContent=st.total;
    document.getElementById('cvotes'+i).textContent=st.count+'票';

    const track=document.getElementById('btrack'+i);
    const trackH=track.parentElement.offsetHeight||160;

    // 1点あたりのピクセル高さを全バー均一にする
    // maxTotalに対してtrackHを使い、1pxあたりの点数を計算
    const pxPerPt=trackH/maxTotal;

    // barTrackの高さをtotalに比例させる（これが重要）
    const barH=Math.round(st.total*pxPerPt);
    track.style.height=barH+'px';

    // セグメント生成（初回のみ）
    if(!document.getElementById(`seg${i}_1`)){
      // 5→1の順でappend（上が5点・下が1点）
      for(let sc=5;sc>=1;sc--){
        const seg=document.createElement('div');
        seg.id=`seg${i}_${sc}`;
        seg.className=`stack-seg sc${sc}`;
        seg.style.height='0px';
        track.appendChild(seg);
      }
    }

    // セグメント高さ更新（barH内での比率）
    for(let sc=1;sc<=5;sc++){
      const seg=document.getElementById(`seg${i}_${sc}`);
      if(!seg) continue;
      const cnt=st.counts[sc-1];
      // このスコアが占める点数 = cnt*sc
      const segH=st.total>0?Math.round((cnt*sc/st.total)*barH):0;
      seg.style.height=segH+'px';

      // セグメント内に投票数を表示（高さが十分あれば）
      if(segH>=18&&cnt>0){
        seg.innerHTML=`<span class="seg-label">${cnt}</span>`;
      } else {
        seg.innerHTML='';
      }
    }

    // トップは強調
    track.style.filter=st.total===maxTotal&&st.total>0?'brightness(1.15)':'none';
  });
}

// ===================== 締め切り =====================
async function endVoting(){
  if(!confirm('投票を締め切りますか？')) return;
  await db.ref('session/closed').set(true);
  document.getElementById('statusBadge').textContent='締切済み';
  document.getElementById('statusBadge').className='badge';
  alert('投票を締め切りました。「結果発表！」ボタンで結果を表示できます。');
}

// ===================== 投票ページ =====================
async function goVote(){
  const snap=await db.ref('session').once('value');
  const sess=snap.val();
  if(!sess||!sess.active){show('setupPage');return;}
  if(sess.closed){show('closedPage');return;}
  teams=sess.teams;
  selScores=[0,0,0,0];
  document.getElementById('voteCards').innerHTML=teams.map((t,i)=>`
    <div class="vote-card vc${i}">
      <div class="vc-entry">ENTRY NO.${i+1}</div>
      <div class="vc-title">${t.name}</div>
      <div class="vc-pres">👤 ${t.presenter}</div>
      <div class="rating-row">
        ${[1,2,3,4,5].map(s=>`
          <button class="star-btn" id="vsb_${i}_${s}" onclick="pickScore(${i},${s})">
            <span class="star-num">${s}</span>
            <span class="star-lbl">${LABELS[s-1]}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
  checkReady();
  show('votePage');
}

function pickScore(ti,s){
  selScores[ti]=s;
  for(let x=1;x<=5;x++){const b=document.getElementById(`vsb_${ti}_${x}`);if(b)b.className='star-btn'+(x===s?' sel':'');}
  checkReady();
}
function checkReady(){
  const all=selScores.every(s=>s>0);
  const btn=document.getElementById('submitBtn');
  btn.disabled=!all;
  btn.textContent=all?'投票する ✓':`残り ${selScores.filter(s=>s===0).length} チームの採点が必要です`;
}
async function submitVote(){
  if(selScores.some(s=>s===0)) return;
  const snap=await db.ref('session/closed').once('value');
  if(snap.val()){show('closedPage');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='送信中...';
  const id='v_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  await db.ref('votes/'+id).set({scores:selScores,ts:Date.now()});
  show('thanksPage');
}

// ===================== 結果発表 =====================
async function revealResults(){
  const snap=await db.ref('votes').once('value');
  const all=Object.values(snap.val()||{});
  document.getElementById('drumrollWrap').style.display='block';
  document.getElementById('resultWrap').style.display='none';
  document.getElementById('resultOverlay').classList.add('active');
  playDrumroll(()=>{
    document.getElementById('drumrollWrap').style.display='none';
    document.getElementById('resultWrap').style.display='flex';
    showRanking(all);
    launchConfetti();
  });
}

function showRanking(all){
  const ranked=teams.map((t,i)=>{
    const sc=all.map(v=>v.scores[i]).filter(s=>s>0);
    return{...t,total:sc.reduce((a,b)=>a+b,0),count:sc.length,idx:i};
  }).sort((a,b)=>b.total-a.total);
  const medalClass=['gold','silver','bronze',''];
  const medalColor=['var(--accent)','#c0c0d0','#cd7f32','var(--muted)'];
  document.getElementById('resultList').innerHTML=ranked.map((t,i)=>`
    <div class="result-item ${medalClass[i]}" id="ri${i}">
      <div class="r-rank" style="color:${medalColor[i]}">${MEDALS[i]}</div>
      <div class="r-info">
        <span class="r-entry">ENTRY NO.${t.idx+1}</span>
        <div class="r-name">${t.name}</div>
        <div class="r-pres">${t.presenter}</div>
      </div>
      <div class="r-score-wrap">
        <div class="r-score">${t.total}</div>
        <div class="r-score-label">合計点（${t.count}票）</div>
      </div>
    </div>
  `).join('');
  ranked.forEach((_,i)=>{
    setTimeout(()=>{const el=document.getElementById('ri'+i);if(el)el.classList.add('show');},600+i*550);
  });
}

function closeResult(){document.getElementById('resultOverlay').classList.remove('active');}

async function resetAll(){
  if(!confirm('本当にリセットしますか？')) return;
  await db.ref('session').remove();
  await db.ref('votes').remove();
  location.href=location.pathname;
}

// ===================== 音声 =====================
function playDrumroll(cb){
  try{
    const audio=new Audio(AUDIO_SRC);
    audio.play().catch(()=>{});
    audio.addEventListener('ended',cb);
    setTimeout(()=>{if(!audio.ended){audio.pause();cb();}},10000);
  }catch(e){setTimeout(cb,2000);}
}

function launchConfetti(){
  for(let i=0;i<120;i++) setTimeout(()=>{
    const e=document.createElement('div');e.className='cp';
    e.style.left=Math.random()*100+'vw';
    e.style.background=CONFETTI[Math.floor(Math.random()*CONFETTI.length)];
    const sz=(7+Math.random()*12)+'px';
    e.style.width=sz;e.style.height=sz;
    e.style.animationDuration=(2+Math.random()*2.5)+'s';
    e.style.animationDelay=(Math.random()*.8)+'s';
    document.body.appendChild(e);setTimeout(()=>e.remove(),5000);
  },Math.random()*600);
}

// ===================== 起動 =====================
async function init(){
  buildSetup();
  const params=new URLSearchParams(location.search);
  if(params.get('vote')==='1'){await goVote();return;}
  const snap=await db.ref('session').once('value');
  const sess=snap.val();
  if(sess&&sess.active){
    teams=sess.teams;
    sess.teams.forEach((t,i)=>{
      const tn=document.getElementById('tn'+i),tp=document.getElementById('tp'+i);
      if(tn)tn.value=t.name;if(tp)tp.value=t.presenter;
    });
    goAdmin();
  }else{show('setupPage');}
}
init();
</script>
